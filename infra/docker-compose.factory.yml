# The Factory's own stack. Products are NOT defined here — each product gets
# its own compose stack generated by the wizard (products/<name>/), so a
# broken product can never take the Factory (or another product) down.
services:
  factory-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: market-ai-factory-backend:latest
    ports:
      - "9080:9080"
    environment:
      - FACTORY_DB_DSN=/app/data/factory.db
    env_file: ../.env
    volumes:
      - ../data:/app/data                      # SQLite registry (capital-critical state)
      - /var/run/docker.sock:/var/run/docker.sock  # orchestrator drives product stacks (P2+)
      - ../products:/app/products              # product specs written by the wizard
    restart: unless-stopped

  factory-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: market-ai-factory-frontend:latest
    ports:
      - "9000:9000"
    depends_on:
      - factory-backend
    restart: unless-stopped

networks:
  default:
    name: factory-net
